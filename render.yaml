services:
  - type: web
    name: meeting-extractor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=backend uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
